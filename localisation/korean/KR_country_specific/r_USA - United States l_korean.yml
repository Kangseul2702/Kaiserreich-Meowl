l_korean:
 USA_strike_season: "파업 철"
 USA_strike_season_desc: "대공황의 초기 몇 해는 노동조합 활동에 타격을 주었지만, 이후 끔찍한 경제 상황과 프랑스 및 특히 영국에서 벌어진 생디칼리슴 혁명의 여파로 인해 미국의 노조는 규모와 호전성 측면에서 전례 없는 성장을 이루었습니다. 미국노동총연맹에 우호적인 인물로 여겨졌던 스미스 대통령의 당선은 역설적으로 노동운동의 급진화를 자극하는 결과를 낳았습니다. 그가 와그너법 같은 친노조 개혁을 통과시키는 한편, 설득력 있는 진보적 경제 구상을 제시하는 데에는 실패했기 때문입니다. 행정부가 실질적인 회복의 동력을 만들어내는 데 실패하면서, 미국 역사상 가장 크고 빈번한 새로운 파업의 물결이 시작되었습니다. '먀울'을 중심으로 한 워싱턴 주의 이종족 디아스포라, 엘리자베스 걸리 플린과 윌리엄 포스터 같은 생디칼리슴 노조 운동가들은 파업이 미국에 혁명을 야기하기를 바라면서 불길에 부채질을 하고 있으며, 파업 현장에서의 무장한 구사대 및 준군사조직과의 폭력적 충돌은 여기에 기름을 들이붓고 있습니다."