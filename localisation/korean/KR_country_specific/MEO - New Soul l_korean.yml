### Leaders ###
 MEO_meowl: "먀울"
 MEO_meowl_leader_desc: "§Y출생:§! §L2013년 4월 28일, 중화인민공화국 웨이보§!\n§Y이력:§! §L1936년의 아메리카는 대공황의 늪에서 헤어나오지 못하고 있었습니다. 경제적 절망은 정치적 극단주의라는 광풍을 불러왔고, 끝없는 정쟁은 국가를 마비시켰습니다. 바로 그때, 밴쿠버 섬의 토착 먀울들이 하나로 결집했습니다. 그들은 혼란에 대한 해답을 찾기 위해 한 명의 '지도자 먀울'을 옹립했고, 기존의 낡은 이념들을 단호히 거부했습니다. 자본주의와 생디칼리슴, 대중주의 내지는 권위주의는 모두 '오래된 영혼들(Old Souls)'이 남긴 실패의 산물일 뿐이라고 선언한 것입니다.\n\n\"우리는 이 낯설고 기이한 세계에 던져진 어린 영혼들입니다. 무엇이 진실이고 무엇이 거짓인지 배우고자 했지만, 우리를 맞이한 것은 끝없는 증오뿐이었습니다.\"§!"
 MEO_cabbit: "캐빗"
 MEO_cabbit_leader_desc: "§Y출생:§! §L2019년 12월 7일 koty_vezde§!\n§Y이력:§! §L먀울이 '모든 실수를 저지르며' 전쟁을 치르는 동안, 그 뒤치다꺼리를 도맡았던 인물이 바로 캐빗이었습니다. 내전은 기적적으로 '새로운 영혼'의 승리로 끝났지만, 먀울은 자신이 저지른 실수들로 인해 희생된 사람들에 대한 죄책감을 이기지 못하고 무너졌습니다. 먀울이 눈물을 흘리며 집무실을 떠난 날, 캐빗은 선글라스를 낀 채 그 자리에 앉아 다리를 책상 위에 올렸습니다.\n\n대중들은 캐빗이 먀울을 몰아냈다고 수군대지만, 사실 캐빗은 먀울을 미워하지 않았습니다. 단지 먀울의 '지나친 열정'이 피곤했을 뿐입니다. 먀울이 세운 거대한 '평화의 기념비'를 부수자는 의견이 나왔을 때, 캐빗은 \"부수는 데 돈이 드니까 그냥 놔둬. 비둘기들이 똥 싸기 좋은 장소네.\"라며 쿨하게 넘겼습니다.\n\n\"나는 감정이 없는 사이코패스라, 그깟 동상 따위는 아무렇지가 않아.\"§!"

### Advisors ###
 MEO_angry_meowl: "화난 먀울"
 MEO_angry_meowl_desc: "§Y출생:§! §L1926년 3월 22일, 캐나다 자치령 브리티시컬럼비아 주 빅토리아§!\n§Y이력:§! §L으그그극ㄱ 이익§\n억까모지???!" #(대충 사이하테 짤)
