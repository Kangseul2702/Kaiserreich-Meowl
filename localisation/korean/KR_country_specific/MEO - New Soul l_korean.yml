 MEO_legacy_new_soul_canada_pact: "생태보전지역법의 유산"
 MEO_legacy_new_soul_canada_pact_desc: "캐스케이디아 권역에 모여 살던 이종족들은 캐나다 자치령의 1930년 생태보전지역법의 제정으로 벤쿠버 섬으로 강제 이주당했습니다. 섬 내에서 이종족들은 상당한 자치권을 누리고 있지만, 섬 밖으로 이동하는 것은 엄격히 금지되어 있었습니다. '먀울'은 생태보전법이 원주민인 이종족들의 권리를 침해하고 인간들에게 차별을 받고 있다 주장하며 압도적 지지를 통해 자치구의 새로운 지도자로 선출되었습니다."
