 MEO_french_army_meowl: "프랑스 유학 먀울" #유학 맞음? 먀울식 해석임 ㅇㅇ
 MEO_french_army_meowl_desc: "§Y출생:§! §L1926년 1월 12일, 우크라이나국 유지우카 현 유지우카§!\n§Y이력:§! §L정권의 열렬한 지지자로서, 젊은 시절 프랑스 공화국 외인부대에 자원입대하여 여러 전선에서 복무한 것으로 유명한 먀울입니다. 러시아 정치인과의 연줄은 그를 사빈코프주의에 강한 영향을 받도록 만들었으며, 보수주의적 정치관 형성에 큰 영향을 끼쳤습니다.§!\n\n§Y참고: 서부를 동경하는 것으로 유명하며, 개척정신과 자유로운 삶을 이상향으로 여기고 있습니다. 이러한 그의 서부에 대한 동경은 지도자 먀울이 이곳에 정착하는 데 적지 않은 영향을 끼쳤습니다.§!"
