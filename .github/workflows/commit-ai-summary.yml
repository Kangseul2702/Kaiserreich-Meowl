name: AI Commit Summary

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read

jobs:
  summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Prepare diff data
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${GITHUB_SHA}"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="$(git rev-parse HEAD~1)"
          fi

          git diff --name-only "$BEFORE" "$AFTER" > changed_files.txt

          git diff --unified=3 "$BEFORE" "$AFTER" \
            -- . \
            ':(exclude)*.lock' \
            ':(exclude)*.min.js' \
            ':(exclude)dist/**' \
            ':(exclude)build/**' \
            ':(exclude)coverage/**' \
            > full_diff.txt

          head -c 50000 full_diff.txt > truncated_diff.txt
          git log --format='%H%n%s%n%b%n---END---' -n 10 > commits.txt

      - name: Build payload
        shell: bash
        run: |
          CHANGED_FILES_JSON=$(jq -R -s -c 'split("\n") | map(select(length > 0))' changed_files.txt)
          COMMITS_TEXT=$(jq -Rs . < commits.txt)
          DIFF_TEXT=$(jq -Rs . < truncated_diff.txt)

          cat > payload.json <<EOF
          {
            "repository": "${GITHUB_REPOSITORY}",
            "branch": "${GITHUB_REF_NAME}",
            "beforeSha": "${{ github.event.before }}",
            "afterSha": "${GITHUB_SHA}",
            "compareUrl": "${{ github.event.compare }}",
            "changedFiles": ${CHANGED_FILES_JSON},
            "commits": ${COMMITS_TEXT},
            "diff": ${DIFF_TEXT},
            "eventName": "${GITHUB_EVENT_NAME}",
            "sender": "${{ github.actor }}"
          }
          EOF

      - name: Send to Railway bot
        env:
          BOT_WEBHOOK_URL: ${{ secrets.BOT_WEBHOOK_URL }}
          BOT_WEBHOOK_TOKEN: ${{ secrets.BOT_WEBHOOK_TOKEN }}
        run: |
          curl -X POST "$COMMIT_SUMMARY_WEBHOOK_URL" \
            -H "Authorization: Bearer $COMMIT_SUMMARY_WEBHOOK_TOKEN" \
            -H "Content-Type: application/json" \
            --data @payload.json
